site_name: XiaoDong
site_url: ""

docs_dir: docs-en
site_dir: site/en

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  extra:
    alternate:
      - name: English
        link: /en/
        lang: en
      - name: 中文
        link: /zh/
        lang: zh

nav:
  - Home: index.md
  - Posts:
      - "McDonal": posts/resnet.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
